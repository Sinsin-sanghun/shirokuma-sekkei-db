<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理 - 施工マニュアル・仕様書DB</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root{
      --bg:#0f1115; --panel:#1a1d25; --border:#2b2f3a;
      --text:#e7e9ee; --muted:#8a8f9c; --accent:#f59e0b; --danger:#ef4444; --ok:#22c55e;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text)}
    header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    header .brand{font-weight:700;font-size:18px}
    header .brand small{color:var(--muted);font-weight:400;margin-left:8px}
    header .user{display:none;gap:12px;align-items:center;font-size:14px}
    header .user .email{color:var(--muted)}
    main{max-width:1100px;margin:0 auto;padding:32px 24px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
    .btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:#242834;color:var(--text);cursor:pointer;font-size:13px;font-family:inherit}
    .btn:hover{background:#2d3240}
    .btn-primary{background:var(--accent);border-color:var(--accent);color:#1a1203;font-weight:600}
    .btn-primary:hover{filter:brightness(1.1)}
    .btn-danger{background:transparent;border-color:var(--danger);color:var(--danger)}
    .btn-danger:hover{background:rgba(239,68,68,.12)}
    .btn-save{background:var(--ok);border-color:var(--ok);color:#052e13;font-weight:600}
    .btn-save:hover{filter:brightness(1.1)}
    h1{margin:0 0 8px;font-size:22px}
    h2{margin:0 0 16px;font-size:14px;color:var(--muted);font-weight:500}
    .google-btn{display:inline-flex;align-items:center;gap:10px;padding:12px 22px;background:#fff;color:#1a1a1a;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
    .google-btn:hover{background:#f5f5f5}
    .center{text-align:center;padding:60px 20px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
    th{color:var(--muted);font-weight:500;background:#15181f}
    tr:hover td{background:rgba(255,255,255,.02)}
    select,input[type=text],input[type=email],input[type=number]{background:#0f1219;border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:13px;font-family:inherit}
    input:focus,select:focus{outline:none;border-color:var(--accent)}
    .add-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;align-items:center}
    @media (max-width:640px){.add-row{grid-template-columns:1fr}}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;background:var(--panel);border:1px solid var(--border);font-size:13px;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}
    .toast.show{opacity:1}
    .toast.error{border-color:var(--danger);color:var(--danger)}
    .toast.ok{border-color:var(--ok);color:var(--ok)}
    .muted{color:var(--muted);font-size:12px}
    .divider{height:1px;background:var(--border);margin:20px 0}
    .hidden{display:none !important}
    .spinner{border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;width:32px;height:32px;animation:spin 1s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .row-actions{display:flex;gap:6px}
  </style>
</head>
<body>
<header>
  <div class="brand">⚙️ 管理画面 <small>施工マニュアル・仕様書DB</small></div>
  <div class="user" id="user-info">
    <span class="email" id="user-email"></span>
    <button class="btn" onclick="window.location.href='/'">← DBに戻る</button>
    <button class="btn" id="logout-btn">ログアウト</button>
  </div>
</header>

<main>
  <div id="loading" class="card center">
    <div class="spinner"></div>
    <p class="muted" style="margin-top:16px">読み込み中...</p>
  </div>

  <div id="login-view" class="card center hidden">
    <h1>🔐 管理者ログイン</h1>
    <h2>Google アカウントでログインしてください</h2>
    <button class="google-btn" id="google-login">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Google でログイン
    </button>
    <p class="muted" style="margin-top:24px">このページは管理者専用です</p>
  </div>

  <div id="denied-view" class="card center hidden">
    <h1>🚫 アクセス権限がありません</h1>
    <h2 id="denied-email"></h2>
    <p class="muted" style="margin:20px 0">このアカウントには管理者権限が付与されていません。<br>権限が必要な場合は super_admin にご連絡ください。</p>
    <button class="btn" id="denied-logout">別のアカウントでログイン</button>
  </div>

  <div id="admin-view" class="hidden">
    <div class="card">
      <h1>👥 ユーザー権限管理</h1>
      <h2>このDBへのアクセス権限を持つユーザー一覧</h2>
      <div class="divider"></div>
      <div style="overflow-x:auto">
        <table id="user-table">
          <thead>
            <tr>
              <th>メールアドレス</th>
              <th style="width:140px">権限</th>
              <th style="width:110px">価格レベル</th>
              <th style="width:140px">登録日</th>
              <th style="width:160px">操作</th>
            </tr>
          </thead>
          <tbody id="user-tbody"></tbody>
        </table>
      </div>
      <p class="muted" id="user-count" style="margin-top:12px"></p>
    </div>

    <div class="card">
      <h1>➕ 新規ユーザー追加</h1>
      <h2>新しいユーザーにアクセス権限を付与</h2>
      <div class="divider"></div>
      <div class="add-row">
        <input type="email" id="new-email" placeholder="メールアドレス (例: user@shirokumapower.com)">
        <select id="new-role">
          <option value="viewer">viewer (閲覧)</option>
          <option value="editor">editor (編集)</option>
          <option value="admin">admin (管理)</option>
        </select>
        <input type="number" id="new-price" placeholder="価格レベル" value="1" min="1" max="5">
        <button class="btn btn-primary" id="add-btn">追加</button>
      </div>
      <p class="muted" style="margin-top:12px">
        <strong>viewer</strong>: データ閲覧のみ &nbsp;|&nbsp;
        <strong>editor</strong>: データ編集可 &nbsp;|&nbsp;
        <strong>admin</strong>: 全権限
      </p>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://manowprcyrfqonzdoqja.supabase.co';
const SUPABASE_KEY = 'sb_publishable_48zBj3w_jQLaH72VsZt20Q_VGgHrCPH';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = (id) => document.getElementById(id);
const show = (id) => $(id).classList.remove('hidden');
const hide = (id) => $(id).classList.add('hidden');

function toast(msg, type='ok') {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  hide('loading');
  if (!session) {
    show('login-view');
    return;
  }
  await checkAdminAndRender(session.user);
}

async function checkAdminAndRender(user) {
  const email = user.email;
  $('user-email').textContent = email;
  $('user-info').style.display = 'flex';

  const { data, error } = await sb
    .from('admin_users')
    .select('email, role')
    .eq('email', email)
    .maybeSingle();

  if (error) {
    toast('管理者チェック失敗: ' + error.message, 'error');
    return;
  }

  if (!data) {
    $('denied-email').textContent = email;
    show('denied-view');
    return;
  }

  show('admin-view');
  await loadUsers();
}

async function loadUsers() {
  const tbody = $('user-tbody');
  tbody.innerHTML = '<tr><td colspan="5" class="center"><div class="spinner"></div></td></tr>';

  const { data, error } = await sb
    .from('user_roles')
    .select('*')
    .order('email');

  if (error) {
    tbody.innerHTML = `<tr><td colspan="5" style="color:var(--danger)">読み込みエラー: ${error.message}</td></tr>`;
    return;
  }

  tbody.innerHTML = '';
  data.forEach(u => {
    const tr = document.createElement('tr');
    const date = u.created_at ? new Date(u.created_at).toLocaleDateString('ja-JP') : '-';
    tr.innerHTML = `
      <td>${u.email}</td>
      <td>
        <select data-field="role" data-email="${u.email}">
          <option value="viewer" ${u.role==='viewer'?'selected':''}>viewer</option>
          <option value="editor" ${u.role==='editor'?'selected':''}>editor</option>
          <option value="admin" ${u.role==='admin'?'selected':''}>admin</option>
        </select>
      </td>
      <td><input type="number" data-field="price_level" data-email="${u.email}" value="${u.price_level}" min="1" max="5" style="width:70px"></td>
      <td class="muted">${date}</td>
      <td class="row-actions">
        <button class="btn btn-save" data-save="${u.email}">保存</button>
        <button class="btn btn-danger" data-del="${u.email}">削除</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
  $('user-count').textContent = `合計 ${data.length} 名`;

  tbody.querySelectorAll('[data-save]').forEach(b => b.onclick = () => saveUser(b.dataset.save));
  tbody.querySelectorAll('[data-del]').forEach(b => b.onclick = () => delUser(b.dataset.del));
}

async function saveUser(email) {
  const tr = $('user-tbody').querySelector(`[data-save="${email}"]`).closest('tr');
  const role = tr.querySelector('[data-field="role"]').value;
  const price = parseInt(tr.querySelector('[data-field="price_level"]').value, 10) || 1;

  const { error } = await sb
    .from('user_roles')
    .update({ role, price_level: price })
    .eq('email', email);

  if (error) return toast('保存失敗: ' + error.message, 'error');
  toast(`${email} を更新しました`);
}

async function delUser(email) {
  if (!confirm(`${email} を削除しますか?`)) return;
  const { error } = await sb.from('user_roles').delete().eq('email', email);
  if (error) return toast('削除失敗: ' + error.message, 'error');
  toast(`${email} を削除しました`);
  await loadUsers();
}

async function addUser() {
  const email = $('new-email').value.trim().toLowerCase();
  const role = $('new-role').value;
  const price_level = parseInt($('new-price').value, 10) || 1;

  if (!email || !email.includes('@')) return toast('有効なメールアドレスを入力', 'error');

  const { error } = await sb.from('user_roles').insert({ email, role, price_level });
  if (error) return toast('追加失敗: ' + error.message, 'error');
  toast(`${email} を追加しました`);
  $('new-email').value = '';
  $('new-price').value = '1';
  await loadUsers();
}

$('google-login').onclick = async () => {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/admin.html' }
  });
};

$('logout-btn').onclick = async () => { await sb.auth.signOut(); window.location.reload(); };
$('denied-logout').onclick = async () => { await sb.auth.signOut(); window.location.reload(); };
$('add-btn').onclick = addUser;

sb.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') {
    window.location.reload();
  }
});

init();
</script>
</body>
</html>
