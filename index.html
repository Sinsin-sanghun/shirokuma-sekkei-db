<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --sidebar-bg: #1a1f2e;
  --sidebar-hover: #252b3d;
  --sidebar-active: #2a3350;
  --sidebar-text: #c8cdd8;
  --sidebar-muted: #6b7280;
  --accent: #e67e22;
  --accent-light: #f39c12;

}
* { margin:0; padding:0; box-sizing:border-box; }
body {

  background: #f5f6f8;
  color: #1a1a2e;
  overflow: hidden;
  height: 100vh;
}

/* ── HEADER ── */
.header {
  height: var(--header-height);
  background: var(--sidebar-bg);
  border-bottom: 1px solid #2a2f40;
  display: flex;
  align-items: center;
  padding: 0 20px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
}
.header-logo {
  font-size: 17px;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
}
.header-logo span {
  color: var(--sidebar-text);
  font-weight: 400;
  margin-left: 8px;
  font-size: 13px;
}
.header-search {
  flex: 1;
  max-width: 520px;
  margin: 0 28px;
  position: relative;
  display: flex;
  align-items: center;
}
.header-search svg {
  position: absolute;
  left: 12px;
  color: #6b7280;
  pointer-events: none;
}
.header-search input {
  width: 100%;
  padding: 9px 14px 9px 38px;
  border: 1px solid #3a4055;
  border-radius: 8px;
  background: #232838;
  color: #e0e0e0;
  font-size: 13px;

  transition: border-color .2s;
}
.header-search input::placeholder { color: #6b7280; }
.header-search input:focus { border-color: var(--accent); }
.btn-search {
  margin-left: 8px;
  padding: 8px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .2s;
}
.btn-search:hover { background: var(--accent-light); }
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-left: auto;
  white-space: nowrap;
}
.header-count {
  color: var(--sidebar-text);
  font-size: 12px;
}
.btn-admin {
  padding: 7px 14px;
  background: #5b21b6;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}
.btn-excel {
  padding: 7px 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── LAYOUT ── */
.layout {
  display: flex;
  height: calc(100vh - var(--header-height));
  margin-top: var(--header-height);
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--sidebar-bg);
  border-right: 1px solid #2a2f40;
  overflow-y: auto;
  padding: 16px 0;
}

.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: #3a4055; border-radius: 3px; }
.sidebar-title {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--sidebar-muted);
  padding: 0 18px 10px;
  letter-spacing: 1px;
  font-weight: 600;
}
.sidebar-item {
  display: flex;
  align-items: center;
  padding: 9px 18px;
  cursor: pointer;
  transition: background .15s;
  color: var(--sidebar-text);
  font-size: 13px;
  gap: 10px;
  border-left: 3px solid transparent;
}
.sidebar-item:hover { background: var(--sidebar-hover); }
.sidebar-item.active {
  background: var(--sidebar-active);
  border-left-color: var(--accent);
  color: #fff;
  font-weight: 600;
}
.sidebar-icon { font-size: 15px; width: 22px; text-align: center; }
.sidebar-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-count {
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  min-width: 22px;
  text-align: center;
}

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px 0;
}
.main-title-area { display: flex; align-items: center; gap: 12px; }
.main-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.main-count { font-size: 13px; color: #6b7280; }
.view-toggle { display: flex; gap: 4px; }
.btn-toggle {
  padding: 7px 16px;
  border: 1px solid #d1d5db;
  background: #fff;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  color: #374151;
  transition: all .15s;
}
.btn-toggle.active {
  background: var(--sidebar-bg);
  color: #fff;
  border-color: var(--sidebar-bg);
}

/* ── TAB MENU (仕様書 / 施工マニュアル) ── */
.tab-menu {
  display: flex;
  gap: 6px;
  padding: 12px 24px 0;
}
.tab-btn {
  padding: 9px 22px;
  border: 2px solid #d1d5db;
  background: #fff;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  color: #374151;
  transition: all .2s;
}
.tab-btn:hover { border-color: var(--accent); color: var(--accent); }
.tab-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.tab-btn .tab-count {
  font-size: 11px;
  background: rgba(0,0,0,.12);
  padding: 1px 8px;
  border-radius: 8px;
}
.tab-btn.active .tab-count {
  background: rgba(255,255,255,.25);
}

/* ── TOOLBAR (メーカーフィルタ) ── */
.toolbar {
  display: flex;
  align-items: center;
  padding: 10px 24px;
  gap: 6px;
  flex-wrap: wrap;
  border-bottom: 1px solid #e5e7eb;
}
.toolbar-label {
  font-size: 12px;
  color: #6b7280;
  margin-right: 4px;
  white-space: nowrap;
}
.btn-filter {
  padding: 5px 14px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  background: #fff;
  font-size: 12px;
  cursor: pointer;
  color: #374151;
  transition: all .15s;
  white-space: nowrap;
}
.btn-filter:hover { border-color: var(--accent); color: var(--accent); }
.btn-filter.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ── SORT BAR ── */
.sort-bar {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 8px 24px;
  gap: 12px;
}
.sort-bar select {
  padding: 5px 10px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-size: 12px;
  background: #fff;
  cursor: pointer;
}

/* ── TABLE ── */
.table-container {
  flex: 1;
  overflow-y: auto;
  padding: 0 24px 24px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead {
  position: sticky;
  top: 0;
  z-index: 10;
}
thead th {
  background: #f0f1f3;
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  color: #374151;
  font-size: 12px;
  border-bottom: 2px solid #e5e7eb;
  white-space: nowrap;
  cursor: pointer;
}
thead th:hover { color: var(--accent); }
tbody tr {
  border-bottom: 1px solid #f0f1f3;
  transition: background .1s;
}
tbody tr:hover { background: #f8f9fb; }
tbody td {
  padding: 10px 12px;
  vertical-align: middle;
}
.td-num {
  color: #9ca3af;
  font-size: 12px;
  width: 40px;
  text-align: center;
}
.td-title {
  color: #2563eb;

  font-weight: 500;
}
.td-title:hover { text-decoration: underline; }

/* category tags - color-coded */
.cat-tag {

.cat-other { background: #fef9c3; color: #854d0e; }
.cat-pcs { background: #dbeafe; color: #1e40af; }
.cat-expo { background: #fce7f3; color: #9d174d; }
.cat-solar { background: #fed7aa; color: #9a3412; }
.cat-elec { background: #e0e7ff; color: #3730a3; }
.cat-cert { background: #d1fae5; color: #065f46; }
.cat-tech { background: #ede9fe; color: #5b21b6; }
.cat-wind { background: #cffafe; color: #155e75; }
.cat-draw { background: #f3e8ff; color: #6b21a8; }
.cat-ems { background: #ccfbf1; color: #134e4a; }
.cat-noise { background: #fef3c7; color: #92400e; }
.cat-om { background: #e0f2fe; color: #075985; }
.cat-safety { background: #fee2e2; color: #991b1b; }
.cat-catalog { background: #f0fdf4; color: #14532d; }
.cat-cable { background: #fae8ff; color: #86198f; }
.cat-fence { background: #fff7ed; color: #9a3412; }

.cat-camera { background: #fdf4ff; color: #701a75; }
.cat-battery { background: #f0f9ff; color: #0c4a6e; }
.cat-transformer { background: #fffbeb; color: #78350f; }
.cat-junction { background: #f8fafc; color: #334155; }
.cat-mount { background: #f1f5f9; color: #475569; }
.cat-experiment { background: #fafaf9; color: #57534e; }
.cat-material { background: #fff1f2; color: #9f1239; }
.cat-cubicle { background: #f5f3ff; color: #4c1d95; }
.cat-grid { background: #fefce8; color: #713f12; }
.cat-default { background: #f3f4f6; color: #374151; }

.td-manufacturer {
  color: #374151;
  font-size: 12px;
}
.tag-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  background: #eff6ff;
  color: #3b82f6;
  font-weight: 500;
}
.td-size {
  color: #6b7280;
  font-size: 12px;
  white-space: nowrap;
}
.btn-open {
  padding: 5px 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  font-weight: 600;
  transition: background .15s;
  white-space: nowrap;
}
.btn-open:hover { background: var(--accent-light); }

/* ── AI SEARCH FOOTER ── */
.ai-footer {
  border-top: 1px solid #e5e7eb;
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fff;
}
.ai-footer input {
  flex: 1;
  padding: 10px 16px;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  font-size: 13px;
  outline: none;
}
.ai-footer input:focus { border-color: var(--accent); }
.btn-ai-send {
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: background .2s;
}
.btn-ai-send:hover { background: var(--accent-light); }

/* ── AI Response Panel ── */
.ai-response-panel {
  border-top: 1px solid #e5e7eb;
  padding: 14px 24px;
  background: #fffbeb;
  display: none;
  max-height: 240px;
  overflow-y: auto;
}
.ai-response-panel.show { display: block; }
.ai-response-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.ai-response-header h4 { font-size: 13px; color: #92400e; }
.btn-ai-close {
  background: none;
  border: none;
  color: #9ca3af;

}
.ai-result-item {
  padding: 8px 12px;

}
.ai-result-item:hover { border-color: var(--accent); }
.ai-result-title { font-size: 13px; font-weight: 600; color: #2563eb; }
.ai-result-meta { font-size: 11px; color: #6b7280; margin-top: 2px; }

/* ── PDF MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff;
  border-radius: 12px;
  width: 90vw;
  height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  overflow: hidden;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid #e5e7eb;
  background: #f9fafb;
}
.modal-title {
  font-size: 14px;
  font-weight: 600;
  color: #1a1a2e;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-right: 16px;
}
.modal-actions { display: flex; gap: 8px; }
.btn-modal {
  padding: 7px 16px;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}
.btn-modal:hover { opacity: .85; }
.btn-newtab { background: #60a5fa; color: #fff; }
.btn-translate { background: #3b82f6; color: #fff; }
.btn-close-modal { background: #ef4444; color: #fff; }
.modal-body { flex: 1; }
.modal-body iframe {

/* ── CARD VIEW ── */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  padding: 0 24px 24px;
  overflow-y: auto;
  flex: 1;
}
.card {

}
.card:hover {

}
.card-title {

  line-height: 1.4;
}
.card-meta {

  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.card-size { font-size: 11px; color: #9ca3af; }
.card-manufacturer { font-size: 11px; color: #6b7280; }

.hide { display: none !important; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .cards { grid-template-columns: 1fr; }
  .modal { width: 98vw; height: 95vh; }
}
</style>

<body>

<!-- ── HEADER ── -->
<header class="header">
  <div class="header-logo">
    設計・工事チーム - 部材情報DB<span>しろくま</span>
  </div>
  <div class="header-search">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="タイトル・メーカー・ファイル名で検索...">
    <button class="btn-search" id="searchBtn">検索</button>
  </div>
  <div class="header-right">
    <span class="header-count" id="headerCount">68件の資料</span>
    <button class="btn-admin">⚙️ 管理</button>
    <button class="btn-excel" id="excelBtn">📥 Excel出力</button>
  </div>
</header>

<!-- ── LAYOUT ── -->
<div class="layout">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-title">カテゴリ</div>
  </nav>

  <!-- MAIN -->
  <main class="main">
    <!-- Title Area -->
    <div class="main-header">
      <div class="main-title-area">
        <h2 class="main-title">📁 <span id="mainTitleText">すべての資料</span></h2>
        <span class="main-count" id="mainCount">68件</span>
      </div>
      <div class="view-toggle">
        <button class="btn-toggle" id="btnCard" onclick="setView('card')">🃏 カード</button>
        <button class="btn-toggle active" id="btnTable" onclick="setView('table')">📊 テーブル</button>
      </div>
    </div>

    <!-- Tab Menu: 仕様書 / 施工マニュアル -->
    <div class="tab-menu">
      <button class="tab-btn active" data-tab="all" onclick="setTab('all',this)">📂 すべて <span class="tab-count" id="tabAllCount">68</span></button>
      <button class="tab-btn" data-tab="仕様書" onclick="setTab('仕様書',this)">📋 仕様書 <span class="tab-count" id="tabSpecCount">61</span></button>
      <button class="tab-btn" data-tab="施工マニュアル" onclick="setTab('施工マニュアル',this)">🔧 施工マニュアル <span class="tab-count" id="tabManualCount">7</span></button>

    <!-- Manufacturer filter -->
    <div class="toolbar" id="toolbar">
      <span class="toolbar-label">メーカー：</span>

    <!-- Sort bar -->
    <div class="sort-bar">
      <select id="sortSelect" onchange="renderView()">

        <option value="size-desc">サイズ(大→小)</option>
        <option value="size-asc">サイズ(小→大)</option>
        <option value="category">カテゴリ順</option>
      </select>
    </div>

    <!-- Table View -->
    <div class="table-container" id="tableView">
      <table>
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th>タイトル ▼</th>
            <th style="width:170px">カテゴリ</th>

            <th style="width:70px">PDF</th>

        <tbody id="tableBody"></tbody>
      </table>

    <!-- Card View -->

    <!-- AI Response Panel -->

        <button class="btn-ai-close" onclick="closeAI()">✕</button>

    </div>

    <!-- AI Search Footer -->
    <div class="ai-footer">
      <span style="font-size:14px">🤖</span>

      <button class="btn-ai-send" id="aiSendBtn">送信</button>
    </div>
  </main>
</div>

<!-- ── PDF MODAL ── -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">PDF</div>
      <div class="modal-actions">
        <button class="btn-modal btn-newtab" onclick="openNewTab()">新しいタブで開く</button>

    </div>
  </div>
</div>

// ══════════════════════════════════════
//  FILTERING
// ══════════════════════════════════════
function getFiltered() {
  let d = [...docsData];
  // Tab filter
  if (state.tab !== 'all') d = d.filter(x => x.tp === state.tab);
  // Category filter
  if (state.category !== 'すべて') d = d.filter(x => x.c === state.category);
  // Manufacturer filter
  if (state.manufacturer !== 'すべて') d = d.filter(x => x.m === state.manufacturer);
  // Search
  if (state.search) {
    const q = state.search.toLowerCase();
    d = d.filter(x => x.t.toLowerCase().includes(q) || x.c.toLowerCase().includes(q) || x.m.toLowerCase().includes(q) || x.f.toLowerCase().includes(q));
  }
  // Sort
  switch(state.sort) {
    case 'title': d.sort((a,b) => a.t.localeCompare(b.t,'ja')); break;
    case 'size-desc': d.sort((a,b) => b.sb - a.sb); break;
    case 'size-asc': d.sort((a,b) => a.sb - b.sb); break;
    case 'category': d.sort((a,b) => a.c.localeCompare(b.c,'ja')); break;
  }
  return d;
}

// ══════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sidebar-title">カテゴリ</div>';
  let data = [...docsData];
  if (state.tab !== 'all') data = data.filter(x => x.tp === state.tab);

  const cats = new Map();
  data.forEach(d => cats.set(d.c, (cats.get(d.c)||0)+1));
  const total = data.length;

  // All
  const allItem = mkSidebarItem('すべて', getCatIcon('すべて'), 'すべて', total);
  sb.appendChild(allItem);

  // Sort categories
  const sorted = [...cats.entries()].sort((a,b) => b[1] - a[1]);
  sorted.forEach(([cat, count]) => {
    sb.appendChild(mkSidebarItem(getCatLabel(cat), getCatIcon(cat), cat, count));
  });
}

function mkSidebarItem(label, icon, catKey, count) {
  const div = document.createElement('div');
  div.className = 'sidebar-item' + (state.category === catKey ? ' active' : '');
  div.innerHTML = `<span class="sidebar-icon">${icon}</span><span class="sidebar-label">${label}</span><span class="sidebar-count">${count}</span>`;
  div.onclick = () => {
    state.category = catKey;
    state.manufacturer = 'すべて';
    buildSidebar(); buildToolbar(); renderView();
  };
  return div;
}

// ══════════════════════════════════════
//  TOOLBAR (MANUFACTURER FILTER)
// ══════════════════════════════════════
function buildToolbar() {
  const tb = document.getElementById('toolbar');
  tb.innerHTML = '<span class="toolbar-label">メーカー：</span>';
  let data = [...docsData];
  if (state.tab !== 'all') data = data.filter(x => x.tp === state.tab);
  if (state.category !== 'すべて') data = data.filter(x => x.c === state.category);

  const mfgs = new Map();
  data.forEach(d => { if(d.m) mfgs.set(d.m, (mfgs.get(d.m)||0)+1); });

  // All button
  tb.appendChild(mkFilterBtn('すべて', 'すべて'));
  [...mfgs.entries()].sort((a,b)=>b[1]-a[1]).forEach(([m]) => {
    tb.appendChild(mkFilterBtn(m, m));
  });
}

function mkFilterBtn(label, mfgKey) {
  const btn = document.createElement('button');
  btn.className = 'btn-filter' + (state.manufacturer === mfgKey ? ' active' : '');
  btn.textContent = label;
  btn.onclick = () => {
    state.manufacturer = mfgKey;
    buildToolbar(); renderView();
  };
  return btn;
}

// ══════════════════════════════════════
//  TAB SWITCH
// ══════════════════════════════════════
function setTab(tab, el) {
  state.tab = tab;
  state.category = 'すべて';
  state.manufacturer = 'すべて';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  buildSidebar(); buildToolbar(); renderView(); updateCounts();
}

// ══════════════════════════════════════
//  VIEW TOGGLE
// ══════════════════════════════════════
function setView(v) {
  state.view = v;
  document.getElementById('btnCard').classList.toggle('active', v==='card');
  document.getElementById('btnTable').classList.toggle('active', v==='table');
  document.getElementById('tableView').classList.toggle('hide', v!=='table');
  document.getElementById('cardView').classList.toggle('hide', v!=='card');
  renderView();
}

// ══════════════════════════════════════
//  RENDER
// ══════════════════════════════════════
function renderView() {
  const data = getFiltered();
  document.getElementById('mainCount').textContent = data.length + '件';
  document.getElementById('headerCount').textContent = data.length + '件の資料';
  const catLabel = state.category === 'すべて' ? 'すべての資料' : getCatLabel(state.category);
  document.getElementById('mainTitleText').textContent = catLabel;

  if (state.view === 'table') renderTable(data);
  else renderCards(data);
}

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  data.forEach((d, i) => {
    const tr = document.createElement('tr');
    const tagHtml = d.tp === '施工マニュアル' ? '<span class="tag-badge">施工M</span>' : '';
    tr.innerHTML = `
      <td class="td-num">${i+1}</td>
      <td><span class="td-title" onclick="openPDF('${encodeURI(d.r)}','${d.t.replace(/'/g,"&#39;")}')">${d.t}</span></td>
      <td><span class="cat-tag ${getCatCss(d.c)}">${getCatLabel(d.c)}</span></td>
      <td class="td-manufacturer">${d.m || '–'}</td>
      <td>${tagHtml}</td>
      <td class="td-size">${d.s}</td>
      <td><button class="btn-open" onclick="openPDF('${encodeURI(d.r)}','${d.t.replace(/'/g,"&#39;")}')">開く</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function renderCards(data) {
  const container = document.getElementById('cardView');
  container.innerHTML = '';
  data.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openPDF(d.r, d.t);
    card.innerHTML = `
      <div class="card-title">${d.t}</div>
      <div class="card-meta">
        <span class="cat-tag ${getCatCss(d.c)}">${getCatLabel(d.c)}</span>
        <span class="card-manufacturer">${d.m || ''}</span>
        <span class="card-size">${d.s}</span>
      </div>
    `;
    container.appendChild(card);
  });
}

function updateCounts() {
  const all = docsData.length;
  const specs = docsData.filter(d=>d.tp==='仕様書').length;
  const manuals = docsData.filter(d=>d.tp==='施工マニュアル').length;
  document.getElementById('tabAllCount').textContent = all;
  document.getElementById('tabSpecCount').textContent = specs;
  document.getElementById('tabManualCount').textContent = manuals;
}

function openPDF(relPath, title) {
  const supaFile = pdfMap[decodeURI(relPath)] || pdfMap[relPath];
  if (supaFile) {
    currentPdfPath = SUPABASE_STORAGE + '/' + supaFile;
  } else {
    currentPdfPath = SUPABASE_STORAGE + '/' + encodeURIComponent('02.部材情報/' + decodeURI(relPath));
  }
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('pdfFrame').src = currentPdfPath;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('pdfFrame').src = '';
}
function openNewTab() { if(currentPdfPath) window.open(currentPdfPath, '_blank'); }
function getSupabasePdfUrl(relPath) {
  const supaFile = pdfMap[relPath];
  return supaFile ? SUPABASE_STORAGE + '/' + supaFile : SUPABASE_STORAGE + '/' + encodeURIComponent('02.部材情報/' + relPath);
}
function openTranslate() {
  if(currentPdfPath) {
    window.open('https://translate.google.com/translate?sl=auto&tl=ja&u=' + encodeURIComponent(currentPdfPath), '_blank');
  }
}

// ══════════════════════════════════════
//  AI SEARCH
// ══════════════════════════════════════
function performAI() {
  const q = document.getElementById('aiInput').value.trim();
  if (!q) return;
  const keywords = q.toLowerCase().split(/[\s、。・,]+/).filter(k => k.length > 0);

  const scored = docsData.map(d => {
    let score = 0;
    const tl = d.t.toLowerCase(), cl = d.c.toLowerCase(), ml = d.m.toLowerCase(), fl = d.f.toLowerCase();
    keywords.forEach(kw => {
      if (tl.includes(kw)) score += 4;
      if (cl.includes(kw)) score += 3;
      if (ml.includes(kw)) score += 2;
      if (fl.includes(kw)) score += 1;
    });
    // Boost if type matches query
    if (q.includes('施工') && d.tp === '施工マニュアル') score += 3;
    if (q.includes('仕様') && d.tp === '仕様書') score += 2;
    if (q.includes('マニュアル') && d.tp === '施工マニュアル') score += 3;
    return {d, score};
  }).filter(x => x.score > 0).sort((a,b) => b.score - a.score).slice(0, 8);

  const panel = document.getElementById('aiPanel');
  const results = document.getElementById('aiResults');
  results.innerHTML = '';

  if (scored.length === 0) {
    results.innerHTML = '<div style="padding:10px;color:#6b7280;">該当する資料が見つかりませんでした。キーワードを変えてお試しください。</div>';
  } else {
    results.innerHTML = `<div style="padding:4px 0 8px;font-size:12px;color:#6b7280;">「${q}」に関連する資料が ${scored.length} 件見つかりました：</div>`;
    scored.forEach(item => {
      const div = document.createElement('div');
      div.className = 'ai-result-item';
      div.onclick = () => openPDF(item.d.r, item.d.t);
      div.innerHTML = `
        <div class="ai-result-title">${item.d.t}</div>
        <div class="ai-result-meta">${getCatLabel(item.d.c)} | ${item.d.m || '–'} | ${item.d.s} | ${item.d.tp}</div>
      `;
      results.appendChild(div);
    });
  }
  panel.classList.add('show');
}
function closeAI() { document.getElementById('aiPanel').classList.remove('show'); }

document.getElementById('excelBtn').addEventListener('click', () => {
  const data = getFiltered();
  let csv = '\uFEFF#,タイトル,カテゴリ,メーカー,タイプ,サイズ,ファイル名\n';
  data.forEach((d,i) => {
    csv += `${i+1},"${d.t}","${getCatLabel(d.c)}","${d.m}","${d.tp}","${d.s}","${d.f}"\n`;
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '部材情報DB_export.csv';
  a.click();
});
